<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SwipeWise | Singapore Credit Card Yield Optimizer</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM CDNJS mirrors -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for runtime compilation in standard iframe environments -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <!-- Firebase Compat SDKs (Stable CDNJS) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            -webkit-tap-highlight-color: transparent;
        }
        /* Keep interface clean with custom modern thin scrollbars */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 99px;
        }
        /* Premium blur effects */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .safe-bottom {
            padding-bottom: calc(env(safe-area-inset-bottom) + 4rem);
        }
    </style>
</head>
<body class="h-full overflow-hidden text-slate-100 selection:bg-emerald-500 selection:text-slate-950">

    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Custom static definitions representing current 2026 Singapore Credit Cards
        const EXCHANGE_RATES = {
            SGD: 1.0,
            MYR: 3.25,
            IDR: 11500,
            USD: 0.74,
        };

        const CARD_TEMPLATES = [
            {
                id: 'maybank-ff',
                name: 'Maybank Friends & Family',
                bank: 'Maybank',
                type: 'Cashback',
                color: 'from-amber-500 to-yellow-600',
                desc: 'Up to 8% cashback on chosen preferred categories with $800 or $1,600 overall spending.',
                whitelists: ['Dining', 'Groceries', 'Commute', 'Automotive', 'Entertainment', 'Kids & Pets', 'Telco & Streaming', 'MYR & IDR Spend'],
                categories: ['Commute', 'Groceries', 'Dining', 'Telco & Streaming', 'Automotive'], 
                statementDay: 1,
                minSpendGates: [800, 1600],
                rates: { tier1: 0.06, tier2: 0.08, base: 0.0022 },
                caps: { tier1: 20, tier2: 30 } 
            },
            {
                id: 'uob-one',
                name: 'UOB One Card',
                bank: 'UOB',
                type: 'Cashback',
                color: 'from-blue-600 to-indigo-700',
                desc: 'Up to 10% on Grab, McDonald\'s, Shopee, SimplyGo & SP Group utilities + up to 3.33% quarterly baseline rebate.',
                whitelists: ['Grab', 'McDonald\'s', 'Shopee', 'SimplyGo', 'SP Group', 'Groceries', 'Dining', 'Retail', 'Travel', 'Online Shopping'],
                categories: ['Grab', 'McDonald\'s', 'Shopee', 'SimplyGo', 'SP Group'], 
                statementDay: 1,
                minSpendGates: [600, 1000, 2000],
                rates: { partner: 0.10, base: 0.0333, fallback: 0.003 },
                caps: { bonusPartnerCap: 600 } 
            },
            {
                id: 'uob-lady-solitaire',
                name: 'UOB Lady\'s Solitaire',
                bank: 'UOB',
                type: 'Miles',
                color: 'from-pink-500 to-purple-700',
                desc: 'Earn 4 Miles Per Dollar (MPD) on chosen preferred categories. S$2,000 monthly cap.',
                whitelists: ['Dining', 'Travel', 'Beauty', 'Fashion', 'Family', 'Entertainment', 'Transport'],
                categories: ['Dining', 'Beauty'], 
                statementDay: 15,
                monthlyCap: 2000,
                rates: { preferred: 4.0, base: 0.4 } 
            },
            {
                id: 'dcs-flexi',
                name: 'DCS Flexi Card',
                bank: 'DCS',
                type: 'Cashback',
                color: 'from-emerald-600 to-teal-800',
                desc: '8% cashback on overall spend with $500 min spend, plus S$415 cap on Foreign Currency Spend.',
                whitelists: ['Dining', 'Groceries', 'Retail', 'Online Shopping', 'Foreign Currency'],
                categories: ['Foreign Currency'],
                statementDay: 1,
                minSpend: 500,
                rates: { promo: 0.08, base: 0.003 },
                caps: { fcyCap: 415 }
            },
            {
                id: 'hsbc-liveplus',
                name: 'HSBC Live+ Card',
                bank: 'HSBC',
                type: 'Cashback',
                color: 'from-red-600 to-rose-700',
                desc: '8% cashback on Dining, Groceries, Shopping & Entertainment. Capped at $250 per quarter.',
                whitelists: ['Dining', 'Groceries', 'Online Shopping', 'Retail', 'Entertainment'],
                categories: ['Dining', 'Groceries', 'Retail', 'Entertainment'],
                statementDay: 1,
                minSpend: 600,
                rates: { preferred: 0.08, base: 0.003 },
                caps: { quarterCap: 250 }
            },
            {
                id: 'hsbc-rev',
                name: 'HSBC Revolution',
                bank: 'HSBC',
                type: 'Miles',
                color: 'from-rose-500 to-orange-600',
                desc: '4 MPD on Online Purchases & Contactless Payments. No minimum spend requirement.',
                whitelists: ['Online Shopping', 'Dining', 'Groceries', 'Travel', 'Commute'],
                categories: ['Online Shopping', 'Dining', 'Groceries', 'Travel', 'Commute'],
                statementDay: 1,
                monthlyCap: 1000,
                rates: { preferred: 4.0, base: 0.4 }
            },
            {
                id: 'uob-preferred',
                name: 'UOB Preferred Visa',
                bank: 'UOB',
                type: 'Miles',
                color: 'from-cyan-600 to-blue-800',
                desc: '4 MPD on mobile contactless and online transactions. Capped at $1,110 spend per month.',
                whitelists: ['Online Shopping', 'Retail', 'Dining', 'Groceries', 'Commute'],
                categories: ['Online Shopping', 'Retail', 'Dining', 'Groceries', 'Commute'],
                statementDay: 1,
                monthlyCap: 1110,
                rates: { preferred: 4.0, base: 0.4 }
            }
        ];

        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'swipewise-public-tenant';
        const configVar = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        let firebaseApp = null;
        let db = null;
        let auth = null;
        let isFirebaseActive = false;

        if (configVar) {
            try {
                const parsedConfig = JSON.parse(configVar);
                firebaseApp = firebase.initializeApp(parsedConfig);
                db = firebase.firestore(firebaseApp);
                auth = firebase.auth(firebaseApp);
                isFirebaseActive = true;
            } catch (err) {
                console.error("Firebase Initialization Failed: ", err);
            }
        }

        // Main App
        function App() {
            // STATE MANAGEMENT
            const [user, setUser] = useState(null);
            const [networkStatus, setNetworkStatus] = useState(isFirebaseActive ? 'Secure Cloud Active' : 'Offline Sandbox');
            const [activeTab, setActiveTab] = useState('optimizer'); // optimizer, wallet, log, analysis, profile
            
            // Transaction Form State
            const [amount, setAmount] = useState('');
            const [currency, setCurrency] = useState('SGD');
            const [category, setCategory] = useState('Dining');
            const [merchant, setMerchant] = useState('');
            const [txDate, setTxDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedCardId, setSelectedCardId] = useState('');
            const [editingId, setEditingId] = useState(null);

            // User Profile Config state
            const [wallet, setWallet] = useState([]);
            const [transactions, setTransactions] = useState([]);
            
            // UI States
            const [showOnboardModal, setShowOnboardModal] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            
            // Auth Form States
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState(null);

            // Mock Data layer fallback for local sandbox instant evaluation
            useEffect(() => {
                const loadMockData = () => {
                    const localWallet = localStorage.getItem('swipewise_wallet');
                    const localTxs = localStorage.getItem('swipewise_transactions');
                    if (localWallet) {
                        setWallet(JSON.parse(localWallet));
                    } else {
                        // Seed default user wallet cards
                        const defaultCards = [
                            { ...CARD_TEMPLATES[0], isCustomized: true, selectedCategories: ['Commute', 'Groceries', 'Dining', 'Telco & Streaming', 'Automotive'], customCap: 375 },
                            { ...CARD_TEMPLATES[1], isCustomized: true, selectedCategories: ['Grab', 'McDonald\'s', 'Shopee', 'SimplyGo', 'SP Group'], customCap: 600 },
                            { ...CARD_TEMPLATES[2], isCustomized: true, selectedCategories: ['Dining', 'Beauty'], customCap: 2000 },
                        ];
                        setWallet(defaultCards);
                        localStorage.setItem('swipewise_wallet', JSON.stringify(defaultCards));
                    }

                    if (localTxs) {
                        setTransactions(JSON.parse(localTxs));
                    } else {
                        const defaultTxs = [
                            { id: 'tx-1', desc: 'Sheng Siong Supermarket', amount: 84.50, currency: 'SGD', category: 'Groceries', cardId: 'maybank-ff', date: '2026-06-10' },
                            { id: 'tx-2', desc: 'Grab ride home', amount: 24.00, currency: 'SGD', category: 'Commute', cardId: 'uob-one', date: '2026-06-12' },
                            { id: 'tx-3', desc: 'Spa treatment', amount: 150.00, currency: 'SGD', category: 'Beauty', cardId: 'uob-lady-solitaire', date: '2026-06-15' },
                        ];
                        setTransactions(defaultTxs);
                        localStorage.setItem('swipewise_transactions', JSON.stringify(defaultTxs));
                    }
                };

                if (isFirebaseActive) {
                    const initAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await auth.signInWithCustomToken(__initial_auth_token);
                            } else {
                                auth.onAuthStateChanged((firebaseUser) => {
                                    if (firebaseUser) {
                                        setUser(firebaseUser);
                                        setNetworkStatus('Secure Cloud Active');
                                        syncFirestoreData(firebaseUser.uid);
                                    } else {
                                        setUser(null);
                                    }
                                });
                            }
                        } catch (err) {
                            console.error("Auth Failure: ", err);
                            setNetworkStatus('Offline Sandbox');
                            loadMockData();
                        }
                    };
                    initAuth();
                } else {
                    setUser({ uid: 'mock-user-id', email: 'sandbox-guest@swipewise.sg', isAnonymous: true });
                    loadMockData();
                }
            }, []);

            const syncFirestoreData = (uid) => {
                if (!db) return;
                
                const walletRef = db.collection('artifacts').doc(APP_ID).collection('users').doc(uid).collection('wallet');
                const txRef = db.collection('artifacts').doc(APP_ID).collection('users').doc(uid).collection('transactions');

                // Sync wallet live
                walletRef.onSnapshot((snapshot) => {
                    const loadedWallet = [];
                    snapshot.forEach((doc) => {
                        loadedWallet.push({ id: doc.id, ...doc.data() });
                    });
                    if (loadedWallet.length > 0) {
                        setWallet(loadedWallet);
                    } else {
                        // Seed default database wallet for multi-tenancy
                        const defaultCards = [
                            { ...CARD_TEMPLATES[0], isCustomized: true, selectedCategories: ['Commute', 'Groceries', 'Dining', 'Telco & Streaming', 'Automotive'], customCap: 375 },
                            { ...CARD_TEMPLATES[1], isCustomized: true, selectedCategories: ['Grab', 'McDonald\'s', 'Shopee', 'SimplyGo', 'SP Group'], customCap: 600 },
                            { ...CARD_TEMPLATES[2], isCustomized: true, selectedCategories: ['Dining', 'Beauty'], customCap: 2000 },
                        ];
                        defaultCards.forEach(c => {
                            walletRef.doc(c.id).set(c);
                        });
                    }
                }, (error) => {
                    console.error("Firestore wallet subscription error: ", error);
                    setNetworkStatus('Sync Blocked');
                });

                // Sync transactions live
                txRef.onSnapshot((snapshot) => {
                    const loadedTxs = [];
                    snapshot.forEach((doc) => {
                        loadedTxs.push({ id: doc.id, ...doc.data() });
                    });
                    loadedTxs.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setTransactions(loadedTxs);
                }, (error) => {
                    console.error("Firestore transactions subscription error: ", error);
                });
            };

            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3500);
            };

            const saveTransaction = async (e) => {
                if (e) e.preventDefault();
                if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) {
                    triggerToast('Provide a valid transaction amount.');
                    return;
                }

                setIsSubmitting(true);
                const sgdEquiv = parseFloat((parseFloat(amount) / EXCHANGE_RATES[currency]).toFixed(2));
                const itemData = {
                    desc: merchant || 'General Merchant',
                    amount: parseFloat(amount),
                    currency,
                    sgdEquivalent: sgdEquiv,
                    category,
                    cardId: selectedCardId || (wallet[0]?.id || 'maybank-ff'),
                    date: txDate,
                };

                if (isFirebaseActive && user && !user.isAnonymous) {
                    const txRef = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('transactions');
                    try {
                        if (editingId) {
                            await txRef.doc(editingId).update(itemData);
                            triggerToast('Ledger entry amended.');
                        } else {
                            await txRef.add(itemData);
                            triggerToast('New ledger record synchronized.');
                        }
                        resetTxForm();
                    } catch (err) {
                        console.error("Firestore save error: ", err);
                        triggerToast('Cloud sync failure. Saved locally instead.');
                    }
                } else {
                    let updatedTxs = [...transactions];
                    if (editingId) {
                        updatedTxs = updatedTxs.map(t => t.id === editingId ? { ...t, ...itemData } : t);
                        triggerToast('Local amendment recorded.');
                    } else {
                        const newId = 'tx-' + Date.now();
                        updatedTxs.unshift({ id: newId, ...itemData });
                        triggerToast('Local entry created.');
                    }
                    setTransactions(updatedTxs);
                    localStorage.setItem('swipewise_transactions', JSON.stringify(updatedTxs));
                    resetTxForm();
                }
                setIsSubmitting(false);
            };

            const deleteTransaction = async (id) => {
                if (isFirebaseActive && user && !user.isAnonymous) {
                    try {
                        await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('transactions').doc(id).delete();
                        triggerToast('Record safely expunged.');
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    const filtered = transactions.filter(t => t.id !== id);
                    setTransactions(filtered);
                    localStorage.setItem('swipewise_transactions', JSON.stringify(filtered));
                    triggerToast('Record safely expunged.');
                }
            };

            const triggerEdit = (item) => {
                setEditingId(item.id);
                setAmount(item.amount.toString());
                setCurrency(item.currency);
                setCategory(item.category);
                setMerchant(item.desc);
                setTxDate(item.date);
                setSelectedCardId(item.cardId);
                setActiveTab('log'); 
            };

            const resetTxForm = () => {
                setEditingId(null);
                setAmount('');
                setMerchant('');
                setTxDate(new Date().toISOString().split('T')[0]);
            };

            const addCardToWallet = async (template) => {
                const isAlreadyAdded = wallet.some(c => c.id === template.id);
                if (isAlreadyAdded) {
                    triggerToast('This card is already active in your wallet.');
                    return;
                }

                const setup = {
                    ...template,
                    isCustomized: true,
                    selectedCategories: [...template.categories],
                    statementDay: template.statementDay || 1,
                    customCap: template.monthlyCap || template.caps?.tier1 || 375
                };

                if (isFirebaseActive && user && !user.isAnonymous) {
                    try {
                        await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('wallet').doc(setup.id).set(setup);
                        triggerToast(`${setup.name} integrated to secure cloud profile!`);
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    const nextWallet = [...wallet, setup];
                    setWallet(nextWallet);
                    localStorage.setItem('swipewise_wallet', JSON.stringify(nextWallet));
                    triggerToast(`${setup.name} added to sandbox wallet!`);
                }
                setShowOnboardModal(false);
            };

            const removeCardFromWallet = async (cardId) => {
                if (wallet.length <= 1) {
                    triggerToast('A minimum of one active card is required to perform calculations.');
                    return;
                }
                if (isFirebaseActive && user && !user.isAnonymous) {
                    try {
                        await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('wallet').doc(cardId).delete();
                        triggerToast('Card isolated from cloud profile.');
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    const filtered = wallet.filter(c => c.id !== cardId);
                    setWallet(filtered);
                    localStorage.setItem('swipewise_wallet', JSON.stringify(filtered));
                    triggerToast('Card isolated from local profile.');
                }
            };

            const updateCardSetup = async (cardId, updatedKeys) => {
                const nextWallet = wallet.map(c => {
                    if (c.id === cardId) {
                        return { ...c, ...updatedKeys };
                    }
                    return c;
                });

                if (isFirebaseActive && user && !user.isAnonymous) {
                    try {
                        await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('wallet').doc(cardId).update(updatedKeys);
                        triggerToast('Preferences synced on cloud.');
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    setWallet(nextWallet);
                    localStorage.setItem('swipewise_wallet', JSON.stringify(nextWallet));
                    triggerToast('Preferences cached locally.');
                }
            };

            // AUTHENTICATION SECURITY
            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError(null);
                if (!authEmail || !authPassword) {
                    setAuthError('Email and credentials must be specified.');
                    return;
                }
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(authEmail, authPassword);
                        triggerToast('Account registered successfully!');
                    } else {
                        await auth.signInWithEmailAndPassword(authEmail, authPassword);
                        triggerToast('Authenticated successfully!');
                    }
                } catch (err) {
                    setAuthError(err.message);
                }
            };

            const handleGoogleLogin = async () => {
                setAuthError(null);
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                    triggerToast('Successfully authenticated via Google Cloud!');
                } catch (err) {
                    setAuthError(err.message);
                }
            };

            const handleLogout = async () => {
                if (isFirebaseActive) {
                    await auth.signOut();
                }
                setUser(null);
                triggerToast('Decoupled tenant lock successfully.');
            };

            // Billing statements calculations helper
            const getStatementRange = (statementDay, referenceDate = new Date()) => {
                const ref = new Date(referenceDate);
                const year = ref.getFullYear();
                const month = ref.getMonth(); 
                
                let start, end;
                if (ref.getDate() >= statementDay) {
                    start = new Date(year, month, statementDay);
                    end = new Date(year, month + 1, statementDay - 1);
                } else {
                    start = new Date(year, month - 1, statementDay);
                    end = new Date(year, month, statementDay - 1);
                }
                return { start, end };
            };

            // Calculate card-level aggregates live in background state
            const cardAggregates = useMemo(() => {
                const aggregates = {};
                
                wallet.forEach(card => {
                    const { start, end } = getStatementRange(card.statementDay || 1);
                    
                    const txInCycle = transactions.filter(t => {
                        if (t.cardId !== card.id) return false;
                        const d = new Date(t.date);
                        return d >= start && d <= end;
                    });

                    const totalCycleSpend = txInCycle.reduce((acc, curr) => acc + (curr.sgdEquivalent || curr.amount), 0);

                    const categorySpend = {};
                    txInCycle.forEach(t => {
                        categorySpend[t.category] = (categorySpend[t.category] || 0) + (t.sgdEquivalent || t.amount);
                    });

                    aggregates[card.id] = {
                        cycleStart: start,
                        cycleEnd: end,
                        totalCycleSpend,
                        categorySpend,
                        txCount: txInCycle.length
                    };
                });

                return aggregates;
            }, [wallet, transactions]);

            // PRECISION REWARDS ENGINE
            const yieldCalculations = useMemo(() => {
                if (wallet.length === 0) return [];

                const testAmount = parseFloat(amount) || 100;
                const testSgd = testAmount / EXCHANGE_RATES[currency];
                const activeCategory = category;

                const results = wallet.map(card => {
                    const agg = cardAggregates[card.id] || { totalCycleSpend: 0, categorySpend: {} };
                    const currentCategorySpend = agg.categorySpend[activeCategory] || 0;
                    
                    let rewardRate = 0;
                    let rewardType = card.type; 
                    let reason = "";
                    let projectedReward = 0;

                    if (card.id === 'maybank-ff') {
                        const isPreferred = card.selectedCategories?.includes(activeCategory);
                        const futureSpend = agg.totalCycleSpend + testSgd;

                        let rate = card.rates.base; 
                        let isHighTier = false;

                        if (futureSpend >= 1600) {
                            rate = card.rates.tier2;
                            isHighTier = true;
                        } else if (futureSpend >= 800) {
                            rate = card.rates.tier1;
                        }

                        if (isPreferred) {
                            const capLimit = card.customCap || (isHighTier ? card.caps.tier2 : card.caps.tier1);
                            const currentCashbackEarned = currentCategorySpend * rate;
                            const remainingCap = Math.max(0, capLimit - currentCashbackEarned);
                            
                            if (remainingCap <= 0) {
                                rewardRate = card.rates.base * 100; 
                                reason = `Category cashback ceiling of S$${capLimit} breached. Reverted to standard 0.22% fallback.`;
                            } else {
                                const potentialReward = testSgd * rate;
                                if (potentialReward <= remainingCap) {
                                    rewardRate = rate * 100;
                                    reason = `Preferred category. Securing high-tier ${rewardRate}% cashback. Headroom left: S$${(remainingCap / rate - testSgd).toFixed(2)}.`;
                                } else {
                                    const highRateAmount = remainingCap / rate;
                                    const baseRateAmount = testSgd - highRateAmount;
                                    const combinedReward = remainingCap + (baseRateAmount * card.rates.base);
                                    rewardRate = (combinedReward / testSgd) * 100;
                                    reason = `Partially capped! First S$${highRateAmount.toFixed(2)} earns ${(rate*100)}%, balance earns base 0.22%.`;
                                }
                            }
                        } else {
                            rewardRate = card.rates.base * 100;
                            reason = `Outside chosen 5 preferred categories. Awarding standard base rate 0.22%.`;
                        }
                        projectedReward = (testSgd * (rewardRate / 100));

                    } else if (card.id === 'uob-one') {
                        const isPartner = card.selectedCategories?.includes(activeCategory) || 
                                          ['Grab', 'McDonald\'s', 'Shopee', 'SimplyGo', 'SP Group'].includes(activeCategory);
                        
                        const totalPartnerSpend = Object.keys(agg.categorySpend)
                            .filter(cat => ['Grab', 'McDonald\'s', 'Shopee', 'SimplyGo', 'SP Group'].includes(cat))
                            .reduce((sum, cat) => sum + agg.categorySpend[cat], 0);

                        if (isPartner) {
                            const remainingBonusCap = Math.max(0, 600 - totalPartnerSpend);
                            if (remainingBonusCap <= 0) {
                                rewardRate = card.rates.fallback * 100;
                                reason = `Partner bonus ceiling of S$600 exceeded. Falling back to base card rewards.`;
                            } else if (testSgd <= remainingBonusCap) {
                                rewardRate = card.rates.partner * 100;
                                reason = `High yield merchant: Earns premium ${rewardRate}% rebate!`;
                            } else {
                                const highAmount = remainingBonusCap;
                                const baseAmount = testSgd - highAmount;
                                const combined = (highAmount * card.rates.partner) + (baseAmount * card.rates.fallback);
                                rewardRate = (combined / testSgd) * 100;
                                reason = `Partial limit. First S$${highAmount.toFixed(2)} earns 10%, balance gets base rates.`;
                            }
                        } else {
                            rewardRate = card.rates.base * 100;
                            reason = `General spend. Earns base 3.33% rebate (subject to quarterly spend goals).`;
                        }
                        projectedReward = (testSgd * (rewardRate / 100));

                    } else if (card.id === 'uob-lady-solitaire') {
                        const isPreferred = card.selectedCategories?.includes(activeCategory);
                        const totalSolSpend = agg.totalCycleSpend;

                        if (isPreferred) {
                            const remainingCap = Math.max(0, card.customCap - totalSolSpend);
                            if (remainingCap <= 0) {
                                rewardRate = card.rates.base;
                                reason = `Lady's Solitaire preferred spending threshold of S$${card.customCap} completed. Base rate of 0.4 MPD applies.`;
                            } else if (testSgd <= remainingCap) {
                                rewardRate = card.rates.preferred;
                                reason = `Preferred category. 4.0 MPD active (S$${(remainingCap - testSgd).toFixed(0)} cap headroom left).`;
                            } else {
                                const highAmount = remainingCap;
                                const baseAmount = testSgd - highAmount;
                                rewardRate = ((highAmount * card.rates.preferred) + (baseAmount * card.rates.base)) / testSgd;
                                reason = `Crosses monthly cap. S$${highAmount.toFixed(2)} receives 4.0 MPD, balance gets base.`;
                            }
                        } else {
                            rewardRate = card.rates.base;
                            reason = `Non-preferred category. Earns baseline 0.4 MPD.`;
                        }
                        projectedReward = testSgd * rewardRate;

                    } else if (card.id === 'dcs-flexi') {
                        const isFcy = activeCategory === 'Foreign Currency' || currency !== 'SGD';
                        const currentFcySpend = agg.categorySpend['Foreign Currency'] || 0;

                        if (isFcy) {
                            const remaining = Math.max(0, 415 - currentFcySpend);
                            if (remaining <= 0) {
                                rewardRate = card.rates.base * 100;
                                reason = `Foreign currency bonus cap ($415) surpassed. Base rate of 0.3% applies.`;
                            } else if (testSgd <= remaining) {
                                rewardRate = card.rates.promo * 100;
                                reason = `FCY transaction matching DCS Flexi 8% yield rate.`;
                            } else {
                                const combined = (remaining * card.rates.promo) + ((testSgd - remaining) * card.rates.base);
                                rewardRate = (combined / testSgd) * 100;
                                reason = `FCY cap split. S$${remaining.toFixed(2)} earns 8%, balance earns base 0.3%.`;
                            }
                        } else {
                            rewardRate = card.rates.promo * 100;
                            reason = `Qualifies for overall 8% cashback campaign (requires S$500 monthly threshold).`;
                        }
                        projectedReward = (testSgd * (rewardRate / 100));

                    } else if (card.id === 'hsbc-liveplus') {

                            reason = `General category. 0.3% base rebate applies.`;

                    } else if (card.id === 'hsbc-rev' || card.id === 'uob-preferred') {
                        const isOnlineOrPay = card.selectedCategories?.includes(activeCategory);

                        const currentSpend = agg.totalCycleSpend;

                            rewardRate = card.rates.base;
                            reason = `Non-bonused transaction type. Baseline 0.4 MPD.`;
                        }
                        projectedReward = testSgd * rewardRate;
                    }

                    return {
                        card,
                        rewardRate,
                        rewardType,
                        projectedReward,
                        reason,
                        normalizedScore
                    };
                });

                        </nav>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
